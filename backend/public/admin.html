<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>IEMS5718 Admin Panel</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 30px;
      }
      form {
        border: 1px solid #ccc;
        padding: 20px;
        margin-bottom: 30px;
      }
      input,
      textarea,
      select,
      button {
        display: block;
        margin: 10px 0;
        padding: 8px;
        width: 300px;
      }
      button {
        width: 160px;
        cursor: pointer;
      }
      h2 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <h1>IEMS5718 Admin Panel</h1>

    <form id="categoryForm">
      <h2>Add Category</h2>
      <input type="text" id="catName" placeholder="Category name" required />
      <button type="submit">Add Category</button>
    </form>

    <form id="updateCategoryForm">
      <h2>Update Category</h2>
      <input
        type="number"
        id="updateCatId"
        placeholder="Category ID"
        required
      />
      <input
        type="text"
        id="updateCatName"
        placeholder="New category name"
        required
      />
      <button type="submit">Update Category</button>
    </form>

    <form id="deleteCategoryForm">
      <h2>Delete Category</h2>
      <input
        type="number"
        id="deleteCatId"
        placeholder="Category ID"
        required
      />
      <button type="submit">Delete Category</button>
    </form>

    <form id="productForm" enctype="multipart/form-data">
      <h2>Add Product</h2>
      <select id="catid" name="catid" required></select>
      <input
        type="text"
        id="name"
        name="name"
        placeholder="Product name"
        required
      />
      <input
        type="number"
        step="0.01"
        id="price"
        name="price"
        placeholder="Price"
        required
      />
      <textarea
        id="description"
        name="description"
        placeholder="Description"
        required
      ></textarea>
      <input type="file" id="image" name="image" accept="image/*" />
      <button type="submit">Add Product</button>
    </form>

    <form id="updateProductForm">
      <h2>Update Product</h2>
      <input type="number" id="updatePid" placeholder="Product ID" required />
      <input
        type="number"
        id="updateProductCatid"
        placeholder="Category ID"
        required
      />
      <input
        type="text"
        id="updateProductName"
        placeholder="New product name"
        required
      />
      <input
        type="number"
        step="0.01"
        id="updateProductPrice"
        placeholder="New price"
        required
      />
      <textarea
        id="updateProductDescription"
        placeholder="New description"
        required
      ></textarea>
      <button type="submit">Update Product</button>
    </form>

    <form id="deleteProductForm">
      <h2>Delete Product</h2>
      <input type="number" id="deletePid" placeholder="Product ID" required />
      <button type="submit">Delete Product</button>
    </form>

    <section style="border: 1px solid #ccc; padding: 20px; margin-bottom: 30px">
      <h2>Orders</h2>
      <button id="refreshOrdersBtn" type="button">Refresh Orders</button>
      <div id="ordersContainer" style="margin-top: 10px"></div>
    </section>

    <script src="/admin/admin.js"></script>
  </body>
</html>
